# 🦁 Savage Frameworks - Nginx Configuration
#
# Optimized for serving static framework files and demos
#
# Standards: nginx best practices, HTTP/2, compression, caching
# Repository: https://github.com/savagenights/savage_frameworks.git

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json;

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML files - no cache for development
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Main location
    location / {
        try_files $uri $uri/ =404;
        
        # Enable autoindex for browsing
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        autoindex_format html;
    }

    # Framework source files
    location /src/ {
        try_files $uri =404;
        add_header Access-Control-Allow-Origin "*";
        
        # Module JS files - allow CORS for ES modules
        location ~* \.js$ {
            add_header Content-Type "application/javascript";
            add_header Access-Control-Allow-Origin "*";
        }
    }

    # Examples directory - serve index.html
    location /examples/ {
        try_files $uri $uri/ =404;
        autoindex off;
    }

    # API/health endpoint for Docker healthcheck
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
        return 404 '<!DOCTYPE html>
<html>
<head><title>404 - Not Found</title>
<style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f8fafc; text-align: center; }
    h1 { color: #ef4444; }
    a { color: #2563eb; }
</style>
</head>
<body>
    <div>
        <h1>🦁 404 - Not Found</h1>
        <p>The page you are looking for does not exist.</p>
        <p><a href="/">← Back to home</a></p>
    </div>
</body>
</html>';
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
        return 500 '<!DOCTYPE html>
<html>
<head><title>Error</title>
<style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f8fafc; text-align: center; }
    h1 { color: #ef4444; }
</style>
</head>
<body>
    <div>
        <h1>🦁 Server Error</h1>
        <p>Something went wrong. Please try again later.</p>
    </div>
</body>
</html>';
    }

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
