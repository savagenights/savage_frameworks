# 🦁 Savage Frameworks - Development Nginx Configuration
#
# Optimized for DEVELOPMENT with hot reloading
# Disables caching so changes are immediately visible
#
# Standards: nginx best practices
# Repository: https://github.com/savagenights/savage_frameworks.git

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;

    # DEVELOPMENT: Disable sendfile for hot reloading
    sendfile off;
    tcp_nopush off;
    tcp_nodelay on;

    # DEVELOPMENT: Disable all caching
    expires off;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;

    # Gzip (keep enabled but minimal)
    gzip on;
    gzip_vary off;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # Main location - serve kitchen-sink demo as root
    location / {
        # Try kitchen-sink.html first, then index.html, then 404
        try_files $uri $uri/ /demo/kitchen-sink.html =404;
        
        # DEVELOPMENT: Ensure no caching of index files
        location ~* \.(html|js|css)$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }
    }

    # Framework source files - CORS for ES modules
    location /src/ {
        try_files $uri =404;
        add_header Access-Control-Allow-Origin "*" always;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Demo and examples - TRY INDEX.HTML FIRST (no autoindex)
    location ~ ^/(demo|examples)/ {
        try_files $uri $uri/ =404;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        
        # Disable directory listing - serve index.html instead
        autoindex off;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Error pages
    error_page 404 /404.html;
    location = /404.html {
        internal;
        return 404 '<!DOCTYPE html>
<html>
<head><title>404 - Not Found</title>
<style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f8fafc; text-align: center; }
    h1 { color: #ef4444; }
    a { color: #2563eb; }
</style>
</head>
<body>
    <div>
        <h1>🦁 404 - Not Found</h1>
        <p>The page you are looking for does not exist.</p>
        <p><a href="/">← Back to home</a></p>
    </div>
</body>
</html>';
    }

    # DEVELOPMENT: Detailed logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log debug;
}
